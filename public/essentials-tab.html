.etab.active{color:#c8962a;border-bottom-color:#c8962a}
.esb{padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:8px}

.esb input::placeholder{color:#444}
.esb input:focus{border-color:rgba(200,150,42,0.35)}
.econtent{padding:18px 24px}
.slabel{font-family:'Helvetica Neue',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#444;margin-bottom:10px;padding-left:1px}
.alist{border:1px solid rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;margin-bottom:6px}
.arow{background:#1a1a1a;display:grid;grid-template-columns:26px 1fr auto;align-items:center;padding:9px 12px;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05);transition:background .15s;cursor:default}
.arow:last-child{border-bottom:none}
.arow:hover{background:#222}
.anum{font-family:'Helvetica Neue',sans-serif;font-size:10px;color:#444;text-align:right}
.ainfo{min-width:0}
.atitle{font-size:13px;color:#e8e4dc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.aartist{font-family:'Helvetica Neue',sans-serif;font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ameta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-family:'Helvetica Neue',sans-serif;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:2px}
.bo{background:rgba(74,140,92,0.12);color:#6ab880;border:1px solid rgba(74,140,92,0.22)}
.bw{background:rgba(200,150,42,0.12);color:#c8962a;border:1px solid rgba(200,150,42,0.28)}
.bm{background:transparent;color:#444;border:1px solid rgba(255,255,255,0.08)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}

.stat-n{font-size:20px;font-weight:500;color:#e8e4dc;display:block}
.stat-l{font-family:'Helvetica Neue',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#555;margin-top:2px;display:block}
.stat-n.amber{color:#c8962a}
.stat-n.green{color:#6ab880}
.ai-block{background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);border-radius:4px;margin-bottom:16px;overflow:hidden}

textarea:focus{border-color:rgba(200,150,42,0.3)}
.ai-acts{display:flex;gap:7px;margin-top:8px}
.ai-resp{background:#0e0e0e;border:1px solid rgba(255,255,255,0.07);border-radius:3px;padding:12px;font-size:12px;color:#888;line-height:1.7;font-style:italic;display:none;margin-top:10px}
.ai-resp.vis{display:block}

.btn-p:hover{background:rgba(200,150,42,0.22)}

    { t: "Sonny Rollins Vol.1",                  a: "Sonny Rollins",              y: 1956 },
    { t: "Workin' and Steamin'",                 a: "Miles Davis",                y: 1956 },
    { t: "Miles Davis Vol.1",                    a: "Miles Davis",                y: 1952 },
    { t: "Bags' Groove",                         a: "Miles Davis",                y: 1954 },
    { t: "Cookin'",                              a: "Miles Davis",                y: 1956 },
    { t: "Tadd Dameron Quartet",                 a: "Tadd Dameron",               y: 1956 },
    { t: "John Lewis",                           a: "John Lewis",                 y: 1958 },
    { t: "Oscar Peterson Trio + One",            a: "Oscar Peterson",             y: 1964 },
    { t: "Night Train",                          a: "Oscar Peterson",             y: 1963 },
  ]},
};

// ─────────────────────────────────────────────
// APP LOGIC
// ─────────────────────────────────────────────
let currentTab = 'overview', sq = '';

function status(t) {
  if (OWNED.has(t)) return 'owned';
  if (WISH.has(t))  return 'wish';
  return 'missing';
}

function badge(s) {
  if (s === 'owned') return '<span class="badge bo">In collectie</span>';
  if (s === 'wish')  return '<span class="badge bw">Wishlist</span>';
  return '<span class="badge bm">Kopen</span>';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.etab').forEach((t, i) => {
    const tabs = ['overview','hardbop','modal','cool','postbop','latin','soul','bebop','wishlist','ai'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  render();
}

function doFilter() { sq = document.getElementById('sq').value.toLowerCase(); render(); }

function filterAlbums(list) {
  if (!sq) return list;
  return list.filter(a => a.t.toLowerCase().includes(sq) || a.a.toLowerCase().includes(sq));
}

function renderAlbumList(albums) {
  const f = filterAlbums(albums);
  if (!f.length) return '<div class="empty">Geen resultaten</div>';
  return '<div class="alist">' + f.map((a, i) => {
    const s = status(a.t);
    return `<div class="arow">
      <span class="anum">${i + 1}</span>
      <div class="ainfo">
        <div class="atitle">${a.t}</div>
        <div class="aartist">${a.a}</div>
      </div>
      <div class="ameta">${badge(s)}<span class="ayear">${a.y}</span></div>
    </div>`;
  }).join('') + '</div>';
}

function renderOverview() {
  const all = Object.values(GENRES).flatMap(g => g.albums);
  const totalOwned = all.filter(a => OWNED.has(a.t)).length;
  const totalWish  = all.filter(a => WISH.has(a.t)).length;
  let html = `<div class="stats">
    <div class="stat"><span class="stat-n">${all.length}</span><span class="stat-l">Totaal essentials</span></div>
    <div class="stat"><span class="stat-n green">${totalOwned}</span><span class="stat-l">In collectie</span></div>
    <div class="stat"><span class="stat-n amber">${totalWish}</span><span class="stat-l">Op wishlist</span></div>
  </div>`;
  Object.entries(GENRES).forEach(([, g]) => {
    const f = filterAlbums(g.albums);
    if (!f.length && sq) return;
    const owned = g.albums.filter(a => OWNED.has(a.t)).length;
    html += `<p class="slabel" style="margin-top:16px">${g.label} — ${owned}/${g.albums.length} in collectie</p>`;
    html += renderAlbumList(g.albums.slice(0, 5));
  });
  return html;
}

function renderGenre(key) {
  const g = GENRES[key];
  const owned = g.albums.filter(a => OWNED.has(a.t)).length;
  const wish  = g.albums.filter(a => WISH.has(a.t)).length;
  let html = `<div class="stats">
    <div class="stat"><span class="stat-n">${g.albums.length}</span><span class="stat-l">Albums</span></div>
    <div class="stat"><span class="stat-n green">${owned}</span><span class="stat-l">In collectie</span></div>
    <div class="stat"><span class="stat-n amber">${wish}</span><span class="stat-l">Wishlist</span></div>
  </div>
  <p class="slabel" style="margin-bottom:8px;color:#666;font-size:10px;font-family:Georgia,serif;font-style:italic;letter-spacing:0;text-transform:none">${g.desc}</p>`;
  html += renderAlbumList(g.albums);
  return html;
}

function renderWishlist() {
  const f = WISHLIST_DATA.filter(w => !sq || w.t.toLowerCase().includes(sq) || w.a.toLowerCase().includes(sq));
  if (!f.length) return '<div class="empty">Geen resultaten</div>';
  return f.map(w => `<div class="wrow">
    <div><div class="wtitle">${w.t}</div><div class="wmeta">${w.a} — ${w.label}, ${w.y}</div></div>
    <div class="wprice">${w.price}</div>
  </div>`).join('');
}

function renderAI() {
  return `
  <div class="ai-block">
    <div class="ai-bh"><span>Persoonlijk advies</span><span class="ai-tag"><span class="dot"></span> Claude Sonnet</span></div>
    <div class="ai-pa">
      <p>Vraag advies op basis van je collectie. Vermeld genre, stemming of pressing voorkeur.</p>
      <textarea id="aip" placeholder="Bijv: ik heb Kind of Blue — wat is de volgende stap in modal jazz?"></textarea>
      <div class="ai-acts">
        <button class="btn-p" id="aib" onclick="askA()">Vraag advies</button>
        <button class="btn-g" onclick="clearA()">Wis</button>
      </div>
      <div class="ai-resp" id="air"></div>
    </div>
  </div>
  <div class="ai-block">
    <div class="ai-bh"><span>Pressing-check</span><span class="ai-tag">Discogs context</span></div>
    <div class="ai-pa">
      <p>Welk pressing is het meest waard? Label, matrijs, prijsrange.</p>
      <textarea id="pip" placeholder="Bijv: Kind of Blue — welke pressing, wat betalen?"></textarea>
      <div class="ai-acts">
        <button class="btn-p" id="pib" onclick="askP()">Check pressing</button>
      </div>
      <div class="ai-resp" id="pir"></div>
    </div>
  </div>`;
}

function render() {
  const c = document.getElementById('econtent');
  if (currentTab === 'overview')  { c.innerHTML = renderOverview(); return; }
  if (currentTab === 'wishlist')  { c.innerHTML = '<p class="slabel">Wishlist LP\'s</p>' + renderWishlist(); return; }
  if (currentTab === 'ai')        { c.innerHTML = renderAI(); return; }
  if (GENRES[currentTab])         { c.innerHTML = renderGenre(currentTab); return; }
}

async function callClaude(system, prompt, btnId, respId) {
  const btn  = document.getElementById(btnId);
  const resp = document.getElementById(respId);
  if (!prompt.trim()) return;
  btn.disabled = true;
  btn.textContent = 'Laden...';
  resp.classList.add('vis');
  resp.textContent = 'Claude denkt na...';
  const collectie = [...OWNED].join(', ');
  const wish      = [...WISH].join(', ');
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `${system}\n\nCollectie van de gebruiker: ${collectie}. Wishlist: ${wish}.`,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const d = await r.json();
    resp.textContent = d.content?.filter(b => b.type === 'text').map(b => b.text).join('') || 'Geen antwoord.';
  } catch(e) {
    resp.textContent = 'Verbindingsfout.';
  }
  btn.disabled = false;
  btn.textContent = btnId === 'aib' ? 'Vraag advies' : 'Check pressing';
}

function askA()  { callClaude('Je bent een kenner van jazz vinyl. Geef kort, precies advies — max 5 zinnen. Vermeld pressing details waar relevant. Nederlands, informeel maar deskundig.', document.getElementById('aip').value, 'aib', 'air'); }
function askP()  { callClaude('Je bent expert in jazz vinyl pressings en Discogs. Geef per album: beste originele pressing (label, jaar, cat.nr), realistisch prijsbereik, 1 concrete tip. Max 5 zinnen. Nederlands.', document.getElementById('pip').value, 'pib', 'pir'); }
function clearA() {
  const i = document.getElementById('aip');
  const r = document.getElementById('air');
  if (i) i.value = '';
  if (r) { r.textContent = ''; r.classList.remove('vis'); }
}

render();
</script>
